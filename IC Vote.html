<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <title>IC Vote</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #141720;
      --border: #1f2430;
      --border-bright: #2d3347;
      --text: #e8eaf0;
      --muted: #5a6070;
      --accent: #4f8ef7;
      --accent-dim: #1a2a4a;
      --buy: #2ecc8a;
      --buy-dim: #0d2e20;
      --sell: #e05a5a;
      --sell-dim: #2e0d0d;
      --high: #f7c94f;
      --med: #4f8ef7;
      --low: #7a8aaa;
      --radius: 6px;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Layout */
    .shell {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }
    .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .wordmark {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Form */
    label {
      display: block;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    .field { margin-bottom: 4px; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      font-family: var(--font-sans);
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border-bright); color: var(--text); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 7px 14px; font-size: 12px; }

    /* Vote buttons */
    .vote-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .vote-btn {
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-bright);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-family: var(--font-sans);
    }
    .vote-btn:hover { border-color: var(--accent); color: var(--text); }

    .vote-btn .conviction {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .vote-btn .direction {
      font-size: 15px;
      font-weight: 600;
    }

    .vote-btn.selected-buy {
      background: var(--buy-dim);
      border-color: var(--buy);
      color: var(--buy);
    }
    .vote-btn.selected-sell {
      background: var(--sell-dim);
      border-color: var(--sell);
      color: var(--sell);
    }

    .high-color { color: var(--high); }
    .med-color { color: var(--med); }
    .low-color { color: var(--low); }

    /* Analyst chips */
    .analyst-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .analyst-chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      border: 1px solid var(--border-bright);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .analyst-chip:hover { border-color: var(--accent); color: var(--text); }
    .analyst-chip.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .analyst-chip.voted { border-color: var(--buy); color: var(--buy); background: var(--buy-dim); }

    /* Results */
    .result-row {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .result-row:last-child { border-bottom: none; }

    .analyst-name {
      font-size: 13px;
      font-weight: 500;
    }

    .vote-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .vote-tag.buy { background: var(--buy-dim); color: var(--buy); border: 1px solid var(--buy); }
    .vote-tag.sell { background: var(--sell-dim); color: var(--sell); border: 1px solid var(--sell); }

    .rationale-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      font-style: italic;
    }

    /* Summary bar */
    .summary-bar {
      display: flex;
      gap: 20px;
      padding: 16px 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }
    .summary-stat { text-align: center; }
    .summary-stat .value {
      font-size: 24px;
      font-family: var(--font-mono);
      font-weight: 500;
    }
    .summary-stat .label {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .divider { width: 1px; background: var(--border); }

    /* Progress */
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin: 12px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Share box */
    .share-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .share-input {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 0;
    }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--font-mono);
    }
    .status-pill.pending { background: var(--accent-dim); color: var(--accent); }
    .status-pill.complete { background: var(--buy-dim); color: var(--buy); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* Divider line */
    .rule { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* Error */
    .error-msg {
      color: var(--sell);
      font-size: 12px;
      font-family: var(--font-mono);
      margin-top: -10px;
      margin-bottom: 12px;
    }

    /* Waiting state */
    .waiting-grid {
      display: grid;
      gap: 8px;
    }
    .waiting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .waiting-row .wname { font-size: 13px; }
    .waiting-row .wstatus {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
    }
    .waiting-row .wstatus.done { color: var(--buy); }

    /* Stock headline */
    .stock-headline {
      margin-bottom: 28px;
    }
    .stock-ticker {
      font-family: var(--font-mono);
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    .stock-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-bright);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    /* Fade in */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* Responsive */
    @media (max-width: 480px) {
      .vote-grid { grid-template-columns: 1fr; }
      .result-row { grid-template-columns: 1fr; gap: 6px; }
      .summary-bar { flex-wrap: wrap; }
    }
  </style>

<body>
<div id="root"><div class="shell"><div class="header"><div class="logo">IC</div><div class="wordmark">Investment Committee · Vote</div></div><div class="fade-in"><div class="card"><div class="card-title">New Voting Session</div><div class="field"><label>Stock / Ticker</label><input placeholder="e.g. NVDA or Nvidia" value=""></div><div class="field"><label>Add Analysts</label><div style="display: flex; gap: 8px;"><input placeholder="Analyst name" value="" style="margin-bottom: 0px; flex: 1 1 0%;"><button class="btn btn-outline btn-sm" style="white-space: nowrap; margin-bottom: 0px;">+ Add</button></div></div><button class="btn btn-primary btn-full">Create Session &amp; Get Link</button></div></div></div></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── Supabase ───────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://imotbttoakwtslaiywng.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imltb3RidHRvYWt3dHNsYWl5d25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzAxNzYsImV4cCI6MjA5NzM0NjE3Nn0.XqGMjgGaDHwOkpOfDuu6wGaKExVMTE4w7ZNXBbM2rr4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── Helpers ─────────────────────────────────────────────────────────────────
function genId() {
  return Math.random().toString(36).slice(2, 8).toUpperCase();
}

function getSessionIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('session');
}

function setSessionInUrl(id) {
  const url = new URL(window.location.href);
  url.searchParams.set('session', id);
  window.history.replaceState({}, '', url.toString());
}

const VOTE_OPTIONS = [
  { conviction: 'High', direction: 'Buy', class: 'buy' },
  { conviction: 'High', direction: 'Sell', class: 'sell' },
  { conviction: 'Medium', direction: 'Buy', class: 'buy' },
  { conviction: 'Medium', direction: 'Sell', class: 'sell' },
  { conviction: 'Low', direction: 'Buy', class: 'buy' },
  { conviction: 'Low', direction: 'Sell', class: 'sell' },
];

const convictionColor = { High: 'high-color', Medium: 'med-color', Low: 'low-color' };

// ─── Header ──────────────────────────────────────────────────────────────────
function Header() {
  return (
    <div className="header">
      <div className="logo">IC</div>
      <div className="wordmark">Investment Committee · Vote</div>
    </div>
  );
}

// ─── Create Session ───────────────────────────────────────────────────────────
function CreateSession({ onCreated }) {
  const [stock, setStock] = useState('');
  const [analystInput, setAnalystInput] = useState('');
  const [analysts, setAnalysts] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  function addAnalyst() {
    const name = analystInput.trim();
    if (!name || analysts.includes(name)) return;
    setAnalysts(prev => [...prev, name]);
    setAnalystInput('');
  }

  function removeAnalyst(name) {
    setAnalysts(prev => prev.filter(a => a !== name));
  }

  async function create() {
    if (!stock.trim()) { setError('Enter a stock ticker or name.'); return; }
    if (analysts.length < 1) { setError('Add at least one analyst.'); return; }
    setError('');
    setLoading(true);
    const id = genId();
    const { error: err } = await sb.from('sessions').insert({
      id,
      stock: stock.trim().toUpperCase(),
      analyst: 'host',
      voters: analysts,
      total_voters: analysts.length,
    });
    if (err) { setError(err.message); setLoading(false); return; }
    setSessionInUrl(id);
    onCreated(id, stock.trim().toUpperCase(), analysts);
    setLoading(false);
  }

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-title">New Voting Session</div>

        <div className="field">
          <label>Stock / Ticker</label>
          <input
            placeholder="e.g. NVDA or Nvidia"
            value={stock}
            onChange={e => setStock(e.target.value)}
          />
        </div>

        <div className="field">
          <label>Add Analysts</label>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              placeholder="Analyst name"
              value={analystInput}
              onChange={e => setAnalystInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addAnalyst()}
              style={{ marginBottom: 0, flex: 1 }}
            />
            <button className="btn btn-outline btn-sm" onClick={addAnalyst} style={{ whiteSpace: 'nowrap', marginBottom: 0 }}>
              + Add
            </button>
          </div>
        </div>

        {analysts.length > 0 && (
          <div className="analyst-list" style={{ marginTop: 8 }}>
            {analysts.map(a => (
              <span key={a} className="analyst-chip selected" onClick={() => removeAnalyst(a)} title="Click to remove">
                {a} ×
              </span>
            ))}
          </div>
        )}

        {error && <div className="error-msg">{error}</div>}

        <button className="btn btn-primary btn-full" onClick={create} disabled={loading}>
          {loading ? <><span className="spinner" /> Creating…</> : 'Create Session & Get Link'}
        </button>
      </div>
    </div>
  );
}

// ─── Voting Screen ────────────────────────────────────────────────────────────
function VoteScreen({ session, onVoted }) {
  const [selectedAnalyst, setSelectedAnalyst] = useState('');
  const [selectedVote, setSelectedVote] = useState(null); // {conviction, direction}
  const [rationale, setRationale] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const [votedAnalysts, setVotedAnalysts] = useState([]);

  useEffect(() => {
    // Fetch who's already voted
    async function fetchVotes() {
      const { data } = await sb.from('votes').select('voter_name').eq('session_id', session.id);
      if (data) setVotedAnalysts(data.map(v => v.voter_name));
    }
    fetchVotes();
  }, [session.id]);

  async function submit() {
    if (!selectedAnalyst) { setError('Select your name.'); return; }
    if (!selectedVote) { setError('Select a vote.'); return; }
    if (votedAnalysts.includes(selectedAnalyst)) { setError('You have already voted in this session.'); return; }
    setError('');
    setSubmitting(true);

    const { error: err } = await sb.from('votes').insert({
      session_id: session.id,
      voter_name: selectedAnalyst,
      conviction: selectedVote.conviction,
      direction: selectedVote.direction,
      rationale: rationale.trim() || null,
    });

    if (err) { setError(err.message); setSubmitting(false); return; }
    onVoted();
    setSubmitting(false);
  }

  const availableAnalysts = session.voters.filter(a => !votedAnalysts.includes(a));

  return (
    <div className="fade-in">
      <div className="stock-headline">
        <div className="stock-ticker">{session.stock}</div>
        <div className="stock-label">Investment Committee Vote</div>
      </div>

      <div className="card">
        <div className="card-title">Who are you?</div>
        <div className="analyst-list">
          {session.voters.map(a => (
            <span
              key={a}
              className={`analyst-chip ${votedAnalysts.includes(a) ? 'voted' : selectedAnalyst === a ? 'selected' : ''}`}
              onClick={() => !votedAnalysts.includes(a) && setSelectedAnalyst(a)}
              title={votedAnalysts.includes(a) ? 'Already voted' : ''}
            >
              {a} {votedAnalysts.includes(a) ? '✓' : ''}
            </span>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Your Vote</div>
        <div className="vote-grid">
          {VOTE_OPTIONS.map(opt => {
            const isSelected = selectedVote?.conviction === opt.conviction && selectedVote?.direction === opt.direction;
            return (
              <div
                key={`${opt.conviction}-${opt.direction}`}
                className={`vote-btn ${isSelected ? `selected-${opt.class}` : ''}`}
                onClick={() => setSelectedVote({ conviction: opt.conviction, direction: opt.direction })}
              >
                <div className={`conviction ${convictionColor[opt.conviction]}`}>{opt.conviction}</div>
                <div className="direction">{opt.direction}</div>
              </div>
            );
          })}
        </div>

        <label>Rationale <span style={{ color: 'var(--muted)', fontSize: 11 }}>(optional)</span></label>
        <textarea
          placeholder="Brief thesis or key considerations…"
          value={rationale}
          onChange={e => setRationale(e.target.value)}
        />

        {error && <div className="error-msg">{error}</div>}

        <button className="btn btn-primary btn-full" onClick={submit} disabled={submitting}>
          {submitting ? <><span className="spinner" /> Submitting…</> : 'Submit Vote'}
        </button>
      </div>
    </div>
  );
}

// ─── Waiting / Results ────────────────────────────────────────────────────────
function ResultsScreen({ session }) {
  const [votes, setVotes] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetchVotes = useCallback(async () => {
    const { data } = await sb.from('votes').select('*').eq('session_id', session.id);
    if (data) setVotes(data);
    setLoading(false);
  }, [session.id]);

  useEffect(() => {
    fetchVotes();
    // Poll every 5 seconds until all votes are in
    const interval = setInterval(fetchVotes, 5000);
    return () => clearInterval(interval);
  }, [fetchVotes]);

  const allVoted = votes.length >= session.total_voters;
  const buyVotes = votes.filter(v => v.direction === 'Buy').length;
  const sellVotes = votes.filter(v => v.direction === 'Sell').length;
  const votedNames = votes.map(v => v.voter_name);
  const pendingNames = session.voters.filter(a => !votedNames.includes(a));
  const pct = Math.round((votes.length / session.total_voters) * 100);

  const shareUrl = window.location.href;

  function copyLink() {
    navigator.clipboard.writeText(shareUrl);
  }

  if (loading) {
    return (
      <div style={{ textAlign: 'center', padding: 60 }}>
        <span className="spinner" />
      </div>
    );
  }

  return (
    <div className="fade-in">
      <div className="stock-headline">
        <div className="stock-ticker">{session.stock}</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 6 }}>
          <div className="stock-label">Investment Committee Vote</div>
          <span className={`status-pill ${allVoted ? 'complete' : 'pending'}`}>
            <span className="dot" />
            {allVoted ? 'Voting complete' : `${votes.length} / ${session.total_voters} voted`}
          </span>
        </div>
      </div>

      {/* Share link */}
      <div className="card">
        <div className="card-title">Session Link</div>
        <div className="share-box">
          <input className="share-input" value={shareUrl} readOnly />
          <button className="btn btn-outline btn-sm" onClick={copyLink}>Copy</button>
        </div>
      </div>

      {/* Progress */}
      {!allVoted && (
        <div className="card">
          <div className="card-title">Waiting for votes</div>
          <div className="progress-track">
            <div className="progress-fill" style={{ width: `${pct}%` }} />
          </div>
          <div className="waiting-grid">
            {session.voters.map(name => (
              <div key={name} className="waiting-row">
                <span className="wname">{name}</span>
                <span className={`wstatus ${votedNames.includes(name) ? 'done' : ''}`}>
                  {votedNames.includes(name) ? '✓ Voted' : 'Pending'}
                </span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 12, fontSize: 11, color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>
            Results revealed when all votes are in · auto-refreshes every 5s
          </div>
        </div>
      )}

      {/* Results — only shown when all have voted */}
      {allVoted && (
        <>
          <div className="summary-bar">
            <div className="summary-stat">
              <div className="value" style={{ color: 'var(--buy)' }}>{buyVotes}</div>
              <div className="label">Buy</div>
            </div>
            <div className="divider" />
            <div className="summary-stat">
              <div className="value" style={{ color: 'var(--sell)' }}>{sellVotes}</div>
              <div className="label">Sell</div>
            </div>
            <div className="divider" />
            <div className="summary-stat">
              <div className="value">{votes.length}</div>
              <div className="label">Total</div>
            </div>
            <div className="divider" />
            <div className="summary-stat">
              <div className="value" style={{ color: buyVotes > sellVotes ? 'var(--buy)' : buyVotes < sellVotes ? 'var(--sell)' : 'var(--muted)' }}>
                {buyVotes > sellVotes ? 'BUY' : buyVotes < sellVotes ? 'SELL' : 'SPLIT'}
              </div>
              <div className="label">Consensus</div>
            </div>
          </div>

          <div className="card">
            <div className="card-title">Individual Votes</div>
            {votes.map(v => (
              <div key={v.id} className="result-row">
                <div>
                  <div className="analyst-name">{v.voter_name}</div>
                  {v.rationale && <div className="rationale-text">"{v.rationale}"</div>}
                </div>
                <div />
                <div>
                  <span className={`vote-tag ${v.direction.toLowerCase()}`}>
                    <span className={convictionColor[v.conviction]}>{v.conviction}</span>
                    {v.direction}
                  </span>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─── Thank You ────────────────────────────────────────────────────────────────
function ThankYou({ session }) {
  return (
    <div className="fade-in">
      <div className="card" style={{ textAlign: 'center', padding: '48px 28px' }}>
        <div style={{ fontSize: 32, marginBottom: 12 }}>✓</div>
        <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Vote submitted</div>
        <div style={{ color: 'var(--muted)', fontSize: 13, marginBottom: 24 }}>
          Results will be visible at this URL once all analysts have voted.
        </div>
        <button className="btn btn-outline" onClick={() => window.location.reload()}>
          View session status
        </button>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('loading'); // loading | create | session | voted | results
  const [session, setSession] = useState(null);

  useEffect(() => {
    const sessionId = getSessionIdFromUrl();
    if (!sessionId) {
      setView('create');
      return;
    }
    // Load existing session
    async function loadSession() {
      const { data, error } = await sb.from('sessions').select('*').eq('id', sessionId).single();
      if (error || !data) {
        setView('create');
        return;
      }
      setSession(data);
      // Check if all votes are in
      const { data: votes } = await sb.from('votes').select('voter_name').eq('session_id', sessionId);
      if (votes && votes.length >= data.total_voters) {
        setView('results');
      } else {
        setView('session');
      }
    }
    loadSession();
  }, []);

  function handleCreated(id, stock, analysts) {
    setSession({ id, stock, voters: analysts, total_voters: analysts.length });
    setView('results'); // creator goes straight to the monitor/share view
  }

  function handleVoted() {
    setView('voted');
  }

  return (
    <div className="shell">
      <Header />
      {view === 'loading' && (
        <div style={{ textAlign: 'center', padding: 60 }}>
          <span className="spinner" />
        </div>
      )}
      {view === 'create' && <CreateSession onCreated={handleCreated} />}
      {view === 'session' && session && <VoteScreen session={session} onVoted={handleVoted} />}
      {view === 'voted' && session && <ThankYou session={session} />}
      {view === 'results' && session && <ResultsScreen session={session} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>


</body></html>
