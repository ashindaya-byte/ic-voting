<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IC Vote</title>
  <script src="./IC Vote_files/react.production.min.js.download"></script>
  <script src="./IC Vote_files/react-dom.production.min.js.download"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f12;
      --surface: #141720;
      --surface2: #1a1e2a;
      --border: #1f2430;
      --border-bright: #2d3347;
      --text: #e8eaf0;
      --muted: #5a6070;
      --accent: #4f8ef7;
      --accent-dim: #1a2a4a;
      --buy: #2ecc8a;
      --buy-dim: #0d2e20;
      --sell: #e05a5a;
      --sell-dim: #2e0d0d;
      --high: #f7c94f;
      --med: #4f8ef7;
      --low: #7a8aaa;
      --radius: 6px;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }
    .shell { max-width: 700px; margin: 0 auto; padding: 40px 20px 80px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; }
    .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: #fff; }
    .wordmark { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-family: var(--font-mono); color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; }
    input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border-bright); border-radius: var(--radius); padding: 10px 12px; color: var(--text); font-family: var(--font-sans); font-size: 14px; outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 72px; }
    .field { margin-bottom: 4px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; font-family: var(--font-sans); }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border-bright); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid var(--sell); color: var(--sell); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 7px 14px; font-size: 12px; }

    /* Vote option buttons */
    .vote-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .vote-opt { padding: 16px 14px; border-radius: var(--radius); border: 1px solid var(--border-bright); background: var(--bg); color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; font-family: var(--font-sans); }
    .vote-opt:hover { border-color: var(--border-bright); color: var(--text); background: var(--surface2); }
    .vote-opt .vo-conviction { font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
    .vote-opt .vo-label { font-size: 15px; font-weight: 600; }
    .vote-opt.sel-hcb { background: var(--buy-dim); border-color: var(--buy); color: var(--buy); }
    .vote-opt.sel-mcb { background: #0d2518; border-color: #1e8a5a; color: #2ecc8a; opacity: 0.8; }
    .vote-opt.sel-lcb { background: #0d1f14; border-color: #1a6640; color: #2ecc8a; opacity: 0.6; }
    .vote-opt.sel-sell { background: var(--sell-dim); border-color: var(--sell); color: var(--sell); }

    /* Analyst chips */
    .analyst-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .chip { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-family: var(--font-mono); border: 1px solid var(--border-bright); color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.sel { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .chip.done { border-color: var(--buy); color: var(--buy); background: var(--buy-dim); cursor: default; }

    /* Weights display */
    .weights-bar { display: flex; gap: 20px; padding: 14px 18px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .w-stat { }
    .w-val { font-size: 20px; font-family: var(--font-mono); font-weight: 500; }
    .w-lbl { font-size: 10px; font-family: var(--font-mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .w-div { width: 1px; background: var(--border); }
    .ow-pos { color: var(--buy); }
    .ow-neg { color: var(--sell); }

    /* Results */
    .vote-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .vote-card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
    .vote-card-header:hover { background: var(--surface2); }
    .vote-card-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .vote-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); font-weight: 500; }
    .vtag-hcb { background: var(--buy-dim); color: var(--buy); border: 1px solid var(--buy); }
    .vtag-mcb { background: #0d2518; color: #2ecc8a; border: 1px solid #1e8a5a; opacity:0.85; }
    .vtag-lcb { background: #0d1f14; color: #2ecc8a; border: 1px solid #1a6640; opacity:0.7; }
    .vtag-sell { background: var(--sell-dim); color: var(--sell); border: 1px solid var(--sell); }
    .hidden-vote { display: inline-block; padding: 4px 14px; border-radius: 4px; background: var(--border); color: var(--muted); font-size: 11px; font-family: var(--font-mono); }
    .note-section { margin-top: 12px; }
    .note-label { font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
    .note-text { font-size: 13px; color: var(--text); font-style: italic; }
    .bull-label { color: var(--buy); }
    .bear-label { color: var(--sell); }

    /* Summary */
    .summary-bar { display: flex; gap: 0; padding: 0; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .s-stat { flex: 1; text-align: center; padding: 16px 8px; border-right: 1px solid var(--border); }
    .s-stat:last-child { border-right: none; }
    .s-val { font-size: 22px; font-family: var(--font-mono); font-weight: 500; }
    .s-lbl { font-size: 10px; font-family: var(--font-mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

    /* Conviction breakdown */
    .breakdown { margin-bottom: 20px; }
    .bd-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .bd-label { font-size: 11px; font-family: var(--font-mono); width: 130px; flex-shrink: 0; color: var(--muted); }
    .bd-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bd-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .bd-count { font-size: 11px; font-family: var(--font-mono); color: var(--muted); width: 20px; text-align: right; }

    /* Debate prompts */
    .prompts-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .prompt-item { display: flex; align-items: center; gap: 8px; }
    .prompt-btn { flex: 1; text-align: left; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: var(--font-sans); }
    .prompt-btn:hover, .prompt-btn.active { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }
    .prompt-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; line-height: 1; }
    .prompt-del:hover { color: var(--sell); }

    /* Progress */
    .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 12px 0; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

    /* Share box */
    .share-box { display: flex; gap: 8px; align-items: center; }
    .share-input { flex: 1; font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 0; }

    /* Status */
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: var(--font-mono); }
    .status-pill.pending { background: var(--accent-dim); color: var(--accent); }
    .status-pill.complete { background: var(--buy-dim); color: var(--buy); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .stock-headline { margin-bottom: 28px; }
    .stock-ticker { font-family: var(--font-mono); font-size: 28px; font-weight: 500; letter-spacing: -0.5px; }

    .error-msg { color: var(--sell); font-size: 12px; font-family: var(--font-mono); margin-top: -10px; margin-bottom: 12px; }
    .rule { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    .waiting-grid { display: grid; gap: 6px; }
    .waiting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
    .wstatus { font-size: 11px; font-family: var(--font-mono); color: var(--muted); }
    .wstatus.done { color: var(--buy); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border-bright); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    @media (max-width: 520px) {
      .vote-options { grid-template-columns: 1fr; }
      .row2 { grid-template-columns: 1fr; }
      .summary-bar { flex-wrap: wrap; }
    }

<body>
<div id="root"><div class="shell"><div class="header"><div class="logo">IC</div><div class="wordmark">Investment Committee · Vote</div></div><div class="fade-in"><div class="card"><div class="card-title">New Voting Session</div><div class="row2"><div class="field"><label>Stock / Ticker</label><input placeholder="e.g. NVDA" value=""></div><div class="field"><label>Presenting Analyst</label><input placeholder="Name" value=""></div></div><div class="row2"><div class="field"><label>Active Weight (%)</label><input type="number" step="0.01" placeholder="e.g. 3.5" value=""></div><div class="field"><label>Benchmark Weight (%)</label><input type="number" step="0.01" placeholder="e.g. 1.2" value=""></div></div><div class="field"><label>Voting Analysts</label><div style="display: flex; gap: 8px; align-items: center;"><input placeholder="Analyst name, press Enter" value="" style="margin-bottom: 0px; flex: 1 1 0%;"><button type="button" class="btn btn-outline btn-sm" style="white-space: nowrap; flex-shrink: 0;">+ Add</button></div></div><button class="btn btn-primary btn-full">Create Session &amp; Get Link</button></div></div></div></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = 'https://imotbttoakwtslaiywng.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imltb3RidHRvYWt3dHNsYWl5d25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzAxNzYsImV4cCI6MjA5NzM0NjE3Nn0.XqGMjgGaDHwOkpOfDuu6wGaKExVMTE4w7ZNXBbM2rr4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_PROMPTS = [
  "What are the key risks that would invalidate this thesis?",
  "What is the market missing that makes this an opportunity?",
  "What catalysts are needed for this to play out, and when?",
  "How does this position size compare to our conviction level?",
  "What would cause you to exit this position?",
  "What assumptions are baked into your valuation?",
  "How correlated is this to our existing portfolio?",
];

const VOTE_OPTIONS = [
  { key: 'hcb', conviction: 'High Conviction', label: 'Buy', cls: 'sel-hcb', tagCls: 'vtag-hcb' },
  { key: 'mcb', conviction: 'Medium Conviction', label: 'Buy', cls: 'sel-mcb', tagCls: 'vtag-mcb' },
  { key: 'lcb', conviction: 'Low Conviction', label: 'Buy', cls: 'sel-lcb', tagCls: 'vtag-lcb' },
  { key: 'sell', conviction: '', label: 'Sell', cls: 'sel-sell', tagCls: 'vtag-sell' },
];

function genId() { return Math.random().toString(36).slice(2, 8).toUpperCase(); }
function getSessionId() { return new URLSearchParams(window.location.search).get('session'); }
function setSessionInUrl(id) {
  const url = new URL(window.location.href);
  url.searchParams.set('session', id);
  window.history.replaceState({}, '', url.toString());
}

function Header() {
  return (
    <div className="header">
      <div className="logo">IC</div>
      <div className="wordmark">Investment Committee · Vote</div>
    </div>
  );
}

// ── CREATE SESSION ────────────────────────────────────────────────────────────
function CreateSession({ onCreated }) {
  const [stock, setStock] = useState('');
  const [presenter, setPresenter] = useState('');
  const [activeW, setActiveW] = useState('');
  const [benchW, setBenchW] = useState('');
  const [analystInput, setAnalystInput] = useState('');
  const [analysts, setAnalysts] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  function addAnalyst() {
    const n = analystInput.trim();
    if (!n || analysts.includes(n)) return;
    setAnalysts(p => [...p, n]);
    setAnalystInput('');
  }

  async function create() {
    if (!stock.trim()) { setError('Enter a stock ticker.'); return; }
    if (analysts.length < 1) { setError('Add at least one analyst.'); return; }
    setError(''); setLoading(true);
    const id = genId();
    const meta = {
      stock: stock.trim().toUpperCase(),
      presenter: presenter.trim(),
      active_weight: activeW ? parseFloat(activeW) : null,
      bench_weight: benchW ? parseFloat(benchW) : null,
      debate_prompts: DEFAULT_PROMPTS,
    };
    const { error: err } = await sb.from('sessions').insert({
      id,
      stock: meta.stock,
      analyst: meta.presenter || 'host',
      voters: analysts,
      total_voters: analysts.length,
      meta,
    });
    if (err) { setError(err.message); setLoading(false); return; }
    setSessionInUrl(id);
    onCreated({ id, ...meta, voters: analysts, total_voters: analysts.length });
    setLoading(false);
  }

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-title">New Voting Session</div>
        <div className="row2">
          <div className="field">
            <label>Stock / Ticker</label>
            <input placeholder="e.g. NVDA" value={stock} onChange={e => setStock(e.target.value)} />
          </div>
          <div className="field">
            <label>Presenting Analyst</label>
            <input placeholder="Name" value={presenter} onChange={e => setPresenter(e.target.value)} />
          </div>
        </div>
        <div className="row2">
          <div className="field">
            <label>Active Weight (%)</label>
            <input type="number" step="0.01" placeholder="e.g. 3.5" value={activeW} onChange={e => setActiveW(e.target.value)} />
          </div>
          <div className="field">
            <label>Benchmark Weight (%)</label>
            <input type="number" step="0.01" placeholder="e.g. 1.2" value={benchW} onChange={e => setBenchW(e.target.value)} />
          </div>
        </div>
        <div className="field">
          <label>Voting Analysts</label>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <input placeholder="Analyst name, press Enter" value={analystInput}
              onChange={e => setAnalystInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addAnalyst(); } }}
              style={{ marginBottom: 0, flex: 1 }} />
            <button type="button" className="btn btn-outline btn-sm" onClick={(e) => { e.preventDefault(); addAnalyst(); }} style={{ whiteSpace: 'nowrap', flexShrink: 0 }}>+ Add</button>
          </div>
        </div>
        {analysts.length > 0 && (
          <div className="analyst-list" style={{ marginTop: 10 }}>
            {analysts.map(a => (
              <span key={a} className="chip sel" onClick={() => setAnalysts(p => p.filter(x => x !== a))} title="Click to remove">
                {a} ×
              </span>
            ))}
          </div>
        )}
        {error && <div className="error-msg">{error}</div>}
        <button className="btn btn-primary btn-full" onClick={create} disabled={loading}>
          {loading ? <><span className="spinner" /> Creating…</> : 'Create Session & Get Link'}
        </button>
      </div>
    </div>
  );
}

// ── VOTE SCREEN ───────────────────────────────────────────────────────────────
function VoteScreen({ session, onVoted }) {
  const [selectedAnalyst, setSelectedAnalyst] = useState('');
  const [selectedVote, setSelectedVote] = useState(null);
  const [bullCase, setBullCase] = useState('');
  const [bearCase, setBearCase] = useState('');
  const [comments, setComments] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const [votedAnalysts, setVotedAnalysts] = useState([]);

  useEffect(() => {
    sb.from('votes').select('voter_name').eq('session_id', session.id)
      .then(({ data }) => { if (data) setVotedAnalysts(data.map(v => v.voter_name)); });
  }, [session.id]);

  async function submit() {
    if (!selectedAnalyst) { setError('Select your name.'); return; }
    if (!selectedVote) { setError('Select a vote.'); return; }
    if (votedAnalysts.includes(selectedAnalyst)) { setError('You have already voted.'); return; }
    setError(''); setSubmitting(true);
    const opt = VOTE_OPTIONS.find(o => o.key === selectedVote);
    const { error: err } = await sb.from('votes').insert({
      session_id: session.id,
      voter_name: selectedAnalyst,
      conviction: opt.conviction,
      direction: opt.label,
      vote_key: selectedVote,
      rationale: comments.trim() || null,
      bull_case: bullCase.trim() || null,
      bear_case: bearCase.trim() || null,
    });
    if (err) { setError(err.message); setSubmitting(false); return; }
    onVoted();
    setSubmitting(false);
  }

  const aw = session.meta?.active_weight;
  const bw = session.meta?.bench_weight;
  const ow = (aw != null && bw != null) ? (aw - bw).toFixed(2) : null;

  return (
    <div className="fade-in">
      <div className="stock-headline">
        <div className="stock-ticker">{session.stock}</div>
        {session.meta?.presenter && (
          <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>
            Presented by {session.meta.presenter}
          </div>
        )}
      </div>

      {(aw != null || bw != null) && (
        <div className="weights-bar">
          {aw != null && (
            <div className="w-stat">
              <div className="w-val">{aw}%</div>
              <div className="w-lbl">Active Weight</div>
            </div>
          )}
          {aw != null && bw != null && <div className="w-div" />}
          {bw != null && (
            <div className="w-stat">
              <div className="w-val">{bw}%</div>
              <div className="w-lbl">Benchmark Weight</div>
            </div>
          )}
          {ow != null && (
            <>
              <div className="w-div" />
              <div className="w-stat">
                <div className={`w-val ${parseFloat(ow) > 0 ? 'ow-pos' : parseFloat(ow) < 0 ? 'ow-neg' : ''}`}>
                  {parseFloat(ow) > 0 ? '+' : ''}{ow}%
                </div>
                <div className="w-lbl">Active Share</div>
              </div>
            </>
          )}
        </div>
      )}

      <div className="card">
        <div className="card-title">Who are you?</div>
        <div className="analyst-list">
          {session.voters.map(a => (
            <span key={a}
              className={`chip ${votedAnalysts.includes(a) ? 'done' : selectedAnalyst === a ? 'sel' : ''}`}
              onClick={() => !votedAnalysts.includes(a) && setSelectedAnalyst(a)}
            >
              {a} {votedAnalysts.includes(a) ? '✓' : ''}
            </span>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Your Vote</div>
        <div className="vote-options">
          {VOTE_OPTIONS.map(opt => (
            <div key={opt.key}
              className={`vote-opt ${selectedVote === opt.key ? opt.cls : ''}`}
              onClick={() => setSelectedVote(opt.key)}
            >
              <div className="vo-conviction">{opt.conviction || '\u00A0'}</div>
              <div className="vo-label">{opt.label}</div>
            </div>
          ))}
        </div>

        <label>Bull Case <span style={{ color: 'var(--muted)', fontSize: 11 }}>(optional)</span></label>
        <textarea placeholder="Key upside drivers, catalysts, or scenario…" value={bullCase} onChange={e => setBullCase(e.target.value)} />

        <label>Bear Case <span style={{ color: 'var(--muted)', fontSize: 11 }}>(optional)</span></label>
        <textarea placeholder="Key risks, downside scenario, or thesis breakers…" value={bearCase} onChange={e => setBearCase(e.target.value)} />

        <label>Additional Comments <span style={{ color: 'var(--muted)', fontSize: 11 }}>(optional)</span></label>
        <textarea placeholder="Any other considerations…" value={comments} onChange={e => setComments(e.target.value)} />

        {error && <div className="error-msg">{error}</div>}
        <button className="btn btn-primary btn-full" onClick={submit} disabled={submitting}>
          {submitting ? <><span className="spinner" /> Submitting…</> : 'Submit Vote'}
        </button>
      </div>
    </div>
  );
}

// ── THANK YOU ─────────────────────────────────────────────────────────────────
function ThankYou() {
  return (
    <div className="fade-in">
      <div className="card" style={{ textAlign: 'center', padding: '48px 28px' }}>
        <div style={{ fontSize: 36, marginBottom: 12 }}>✓</div>
        <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>Vote submitted</div>
        <div style={{ color: 'var(--muted)', fontSize: 13, marginBottom: 24 }}>
          Results will be visible once all analysts have voted.
        </div>
        <button className="btn btn-outline" onClick={() => window.location.reload()}>Check session status</button>
      </div>
    </div>
  );
}

// ── RESULTS / MONITOR ─────────────────────────────────────────────────────────
function ResultsScreen({ session: initialSession }) {
  const [session, setSession] = useState(initialSession);
  const [votes, setVotes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [revealed, setRevealed] = useState({});
  const [revealAll, setRevealAll] = useState(false);
  const [activePrompt, setActivePrompt] = useState(null);
  const [prompts, setPrompts] = useState(initialSession.meta?.debate_prompts || DEFAULT_PROMPTS);
  const [newPrompt, setNewPrompt] = useState('');
  const [notes, setNotes] = useState('');

  const fetchVotes = useCallback(async () => {
    const { data } = await sb.from('votes').select('*').eq('session_id', session.id).order('created_at');
    if (data) setVotes(data);
    setLoading(false);
  }, [session.id]);

  useEffect(() => {
    fetchVotes();
    const iv = setInterval(fetchVotes, 5000);
    return () => clearInterval(iv);
  }, [fetchVotes]);

  const allVoted = votes.length >= session.total_voters;
  const votedNames = votes.map(v => v.voter_name);
  const buyVotes = votes.filter(v => v.direction === 'Buy').length;
  const sellVotes = votes.filter(v => v.direction === 'Sell').length;
  const pct = Math.round((votes.length / session.total_voters) * 100);

  const convCounts = {
    hcb: votes.filter(v => v.vote_key === 'hcb').length,
    mcb: votes.filter(v => v.vote_key === 'mcb').length,
    lcb: votes.filter(v => v.vote_key === 'lcb').length,
    sell: votes.filter(v => v.vote_key === 'sell').length,
  };

  const aw = session.meta?.active_weight;
  const bw = session.meta?.bench_weight;
  const ow = (aw != null && bw != null) ? (aw - bw).toFixed(2) : null;

  function toggleReveal(id) {
    setRevealed(p => ({ ...p, [id]: !p[id] }));
  }

  function getTagCls(voteKey) {
    return VOTE_OPTIONS.find(o => o.key === voteKey)?.tagCls || 'vtag-hcb';
  }
  function getVoteLabel(v) {
    const opt = VOTE_OPTIONS.find(o => o.key === v.vote_key);
    if (!opt) return v.direction;
    return opt.conviction ? `${opt.conviction} ${opt.label}` : opt.label;
  }

  function copyLink() { navigator.clipboard.writeText(window.location.href); }

  function addPrompt() {
    const p = newPrompt.trim();
    if (!p) return;
    setPrompts(prev => [...prev, p]);
    setNewPrompt('');
  }

  function exportResults() {
    const lines = [
      `IC VOTE — ${session.stock}`,
      `Date: ${new Date().toLocaleDateString()}`,
      session.meta?.presenter ? `Presenter: ${session.meta.presenter}` : '',
      aw != null ? `Active Weight: ${aw}%` : '',
      bw != null ? `Benchmark Weight: ${bw}%` : '',
      ow != null ? `Active Share: ${parseFloat(ow) > 0 ? '+' : ''}${ow}%` : '',
      '',
      `SUMMARY: ${buyVotes} Buy / ${sellVotes} Sell`,
      `  High Conviction Buy: ${convCounts.hcb}`,
      `  Medium Conviction Buy: ${convCounts.mcb}`,
      `  Low Conviction Buy: ${convCounts.lcb}`,
      `  Sell: ${convCounts.sell}`,
      '',
      'VOTES:',
      ...votes.map(v => [
        `${v.voter_name}: ${getVoteLabel(v)}`,
        v.bull_case ? `  Bull: ${v.bull_case}` : '',
        v.bear_case ? `  Bear: ${v.bear_case}` : '',
        v.rationale ? `  Comments: ${v.rationale}` : '',
      ].filter(Boolean).join('\n')),
      '',
      notes ? `SESSION NOTES:\n${notes}` : '',
    ].filter(l => l !== '');
    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `IC_Vote_${session.stock}_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  }

  if (loading) return <div style={{ textAlign: 'center', padding: 60 }}><span className="spinner" /></div>;

  return (
    <div className="fade-in">
      <div className="stock-headline">
        <div className="stock-ticker">{session.stock}</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 6, flexWrap: 'wrap' }}>
          {session.meta?.presenter && <span style={{ fontSize: 12, color: 'var(--muted)' }}>Presented by {session.meta.presenter}</span>}
          <span className={`status-pill ${allVoted ? 'complete' : 'pending'}`}>
            <span className="dot" />
            {allVoted ? 'Voting complete' : `${votes.length} / ${session.total_voters} voted`}
          </span>
        </div>
      </div>

      {/* Weights */}
      {(aw != null || bw != null) && (
        <div className="weights-bar" style={{ marginBottom: 16 }}>
          {aw != null && <div className="w-stat"><div className="w-val">{aw}%</div><div className="w-lbl">Active Weight</div></div>}
          {aw != null && bw != null && <div className="w-div" />}
          {bw != null && <div className="w-stat"><div className="w-val">{bw}%</div><div className="w-lbl">Benchmark Weight</div></div>}
          {ow != null && <><div className="w-div" /><div className="w-stat">
            <div className={`w-val ${parseFloat(ow) > 0 ? 'ow-pos' : parseFloat(ow) < 0 ? 'ow-neg' : ''}`}>
              {parseFloat(ow) > 0 ? '+' : ''}{ow}%
            </div>
            <div className="w-lbl">Active Share</div>
          </div></>}
        </div>
      )}

      {/* Share link */}
      <div className="card">
        <div className="card-title">Session Link — share with analysts</div>
        <div className="share-box">
          <input className="share-input" value={window.location.href} readOnly />
          <button className="btn btn-outline btn-sm" onClick={copyLink}>Copy</button>
        </div>
      </div>

      {/* Waiting */}
      {!allVoted && (
        <div className="card">
          <div className="card-title">Waiting for votes</div>
          <div className="progress-track"><div className="progress-fill" style={{ width: `${pct}%` }} /></div>
          <div className="waiting-grid">
            {session.voters.map(name => (
              <div key={name} className="waiting-row">
                <span>{name}</span>
                <span className={`wstatus ${votedNames.includes(name) ? 'done' : ''}`}>
                  {votedNames.includes(name) ? '✓ Voted' : 'Pending'}
                </span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 10, fontSize: 11, color: 'var(--muted)', fontFamily: 'var(--font-mono)' }}>
            Auto-refreshes every 5s · results revealed when all votes are in
          </div>
        </div>
      )}

      {/* Results */}
      {allVoted && (
        <>
          {/* Summary */}
          <div className="summary-bar">
            <div className="s-stat"><div className="s-val" style={{ color: 'var(--buy)' }}>{buyVotes}</div><div className="s-lbl">Buy</div></div>
            <div className="s-stat"><div className="s-val" style={{ color: 'var(--sell)' }}>{sellVotes}</div><div className="s-lbl">Sell</div></div>
            <div className="s-stat"><div className="s-val">{votes.length}</div><div className="s-lbl">Total</div></div>
            <div className="s-stat">
              <div className="s-val" style={{ color: buyVotes > sellVotes ? 'var(--buy)' : buyVotes < sellVotes ? 'var(--sell)' : 'var(--muted)' }}>
                {buyVotes > sellVotes ? 'BUY' : buyVotes < sellVotes ? 'SELL' : 'SPLIT'}
              </div>
              <div className="s-lbl">Consensus</div>
            </div>
          </div>

          {/* Conviction breakdown */}
          <div className="card">
            <div className="card-title">Conviction Breakdown</div>
            <div className="breakdown">
              {[
                { key: 'hcb', label: 'High Conv. Buy', color: 'var(--buy)' },
                { key: 'mcb', label: 'Med. Conv. Buy', color: '#1e8a5a' },
                { key: 'lcb', label: 'Low Conv. Buy', color: '#1a6640' },
                { key: 'sell', label: 'Sell', color: 'var(--sell)' },
              ].map(row => (
                <div key={row.key} className="bd-row">
                  <div className="bd-label">{row.label}</div>
                  <div className="bd-track">
                    <div className="bd-fill" style={{ width: `${votes.length ? (convCounts[row.key] / votes.length) * 100 : 0}%`, background: row.color }} />
                  </div>
                  <div className="bd-count">{convCounts[row.key]}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Individual votes */}
          <div className="card">
            <div className="card-title" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span>Individual Votes</span>
              <button className="btn btn-outline btn-sm" onClick={() => setRevealAll(p => !p)}>
                {revealAll ? 'Hide all' : 'Reveal all'}
              </button>
            </div>
            {votes.map(v => {
              const isRevealed = revealAll || revealed[v.id];
              return (
                <div key={v.id} className="vote-card">
                  <div className="vote-card-header" onClick={() => toggleReveal(v.id)}>
                    <span style={{ fontWeight: 500, fontSize: 13 }}>{v.voter_name}</span>
                    {isRevealed
                      ? <span className={`vote-tag ${getTagCls(v.vote_key)}`}>{getVoteLabel(v)}</span>
                      : <span className="hidden-vote">tap to reveal</span>
                    }
                  </div>
                  {isRevealed && (v.bull_case || v.bear_case || v.rationale) && (
                    <div className="vote-card-body">
                      {v.bull_case && (
                        <div className="note-section">
                          <div className="note-label bull-label">Bull Case</div>
                          <div className="note-text">{v.bull_case}</div>
                        </div>
                      )}
                      {v.bear_case && (
                        <div className="note-section">
                          <div className="note-label bear-label">Bear Case</div>
                          <div className="note-text">{v.bear_case}</div>
                        </div>
                      )}
                      {v.rationale && (
                        <div className="note-section">
                          <div className="note-label">Comments</div>
                          <div className="note-text">{v.rationale}</div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Debate prompts */}
          <div className="card">
            <div className="card-title">Debate Prompts</div>
            <div className="prompts-grid">
              {prompts.map((p, i) => (
                <div key={i} className="prompt-item">
                  <button className={`prompt-btn ${activePrompt === i ? 'active' : ''}`} onClick={() => setActivePrompt(activePrompt === i ? null : i)}>
                    {p}
                  </button>
                  <button className="prompt-del" onClick={() => setPrompts(prev => prev.filter((_, j) => j !== i))}>×</button>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <input placeholder="Add a custom prompt…" value={newPrompt}
                onChange={e => setNewPrompt(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addPrompt()}
                style={{ marginBottom: 0, flex: 1 }} />
              <button className="btn btn-outline btn-sm" onClick={addPrompt}>Add</button>
            </div>
          </div>

          {/* Session notes */}
          <div className="card">
            <div className="card-title">Session Notes</div>
            <textarea placeholder="Key debate points, dissenting views, follow-up actions…"
              value={notes} onChange={e => setNotes(e.target.value)} style={{ minHeight: 100 }} />
          </div>

          {/* Export */}
          <button className="btn btn-outline btn-full" onClick={exportResults}>Export Summary ↓</button>
        </>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('loading');
  const [session, setSession] = useState(null);

  useEffect(() => {
    const id = getSessionId();
    if (!id) { setView('create'); return; }
    async function load() {
      const { data, error } = await sb.from('sessions').select('*').eq('id', id).single();
      if (error || !data) { setView('create'); return; }
      const sess = { ...data, ...(data.meta || {}), voters: data.voters };
      setSession(sess);
      const { data: votes } = await sb.from('votes').select('voter_name').eq('session_id', id);
      if (votes && votes.length >= data.total_voters) setView('results');
      else setView('session');
    }
    load();
  }, []);

  return (
    <div className="shell">
      <Header />
      {view === 'loading' && <div style={{ textAlign: 'center', padding: 60 }}><span className="spinner" /></div>}
      {view === 'create' && <CreateSession onCreated={s => { setSession(s); setView('results'); }} />}
      {view === 'session' && session && <VoteScreen session={session} onVoted={() => setView('voted')} />}
      {view === 'voted' && <ThankYou />}
      {view === 'results' && session && <ResultsScreen session={session} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
